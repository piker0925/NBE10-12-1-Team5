spring:
  datasource:
    url: jdbc:h2:mem:dev;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: fiveguys
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
